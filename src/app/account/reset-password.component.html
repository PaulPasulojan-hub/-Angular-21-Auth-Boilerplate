<div class="auth-wrapper">
  <div class="card">
    <p class="eyebrow">Almost there</p>
    <h1>Choose a new <em>password</em></h1>

    <alert></alert>

    <form *ngIf="!tokenInvalid" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="password">New password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="At least 6 characters"
          autocomplete="new-password"
          [class.error]="submitted && f['password'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['password'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm new password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Repeat your password"
          autocomplete="new-password"
          [class.error]="submitted && f['confirmPassword'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['confirmPassword'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span *ngIf="f['confirmPassword'].errors['required']">Please confirm your password</span>
          <span *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords do not match</span>
        </div>
      </div>

      <button class="btn" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner"></span>
        {{ submitting ? 'Resetting…' : 'Reset password' }}
      </button>
    </form>

    <div class="footer-links" style="justify-content: center; margin-top: 1.25rem;">
      <a routerLink="/account/login">Back to sign in</a>
    </div>
  </div>
</div>
