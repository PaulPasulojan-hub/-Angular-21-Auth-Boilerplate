<div class="page">
  <div class="card">
    <div class="logo">
      <i class="ti ti-bolt"></i>
    </div>
    <p class="welcome">Welcome back</p>
    <h1 class="title">Sign in to your <span>account</span></h1>

    <alert></alert>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" formControlName="email" placeholder="you@example.com"
            [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
        </div>
        <div *ngIf="submitted && f['email'].errors" class="error-msg">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Email must be valid</div>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="ti ti-lock"></i>
          <input type="password" formControlName="password" placeholder="••••••••"
            [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />
        </div>
        <div *ngIf="submitted && f['password'].errors" class="error-msg">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>

      <!-- ✅ changed 'submitting' to 'loading' to match the TS property -->
      <button class="btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Sign in</span>
      </button>
    </form>

    <div class="links">
      <a routerLink="/account/register">Create an account</a>
      <a routerLink="/account/forgot-password">Forgot password?</a>
    </div>
  </div>
</div>
