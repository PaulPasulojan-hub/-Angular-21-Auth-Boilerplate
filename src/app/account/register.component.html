<div class="auth-wrapper">
  <div class="card">
    <p class="eyebrow">Get started</p>
    <h1>Create your <em>account</em></h1>

    <alert></alert>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="firstName">First name</label>
        <input
          id="firstName"
          type="text"
          formControlName="firstName"
          placeholder="Jane"
          [class.error]="submitted && f['firstName'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['firstName'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>First name is required</span>
        </div>
      </div>

      <div class="field">
        <label for="lastName">Last name</label>
        <input
          id="lastName"
          type="text"
          formControlName="lastName"
          placeholder="Doe"
          [class.error]="submitted && f['lastName'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['lastName'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>Last name is required</span>
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          [class.error]="submitted && f['email'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['email'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Please enter a valid email address</span>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="At least 6 characters"
          autocomplete="new-password"
          [class.error]="submitted && f['password'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['password'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Repeat your password"
          autocomplete="new-password"
          [class.error]="submitted && f['confirmPassword'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['confirmPassword'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span *ngIf="f['confirmPassword'].errors['required']">Please confirm your password</span>
          <span *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords do not match</span>
        </div>
      </div>

      <button class="btn" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner"></span>
        {{ submitting ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <div class="footer-links" style="justify-content: center;">
      <a routerLink="/account/login">Already have an account? Sign in</a>
    </div>
  </div>
</div>
