<div class="auth-wrapper">
  <div class="card">
    <p class="eyebrow">Account recovery</p>
    <h1>Reset your <em>password</em></h1>
    <p class="subtitle" *ngIf="!submitted">Enter your email and we'll send you a reset link.</p>

    <alert></alert>

    <form *ngIf="!submitted" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"
          [class.error]="submitted && f['email'].errors"
        />
        <div class="field-error" *ngIf="submitted && f['email'].errors">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Please enter a valid email address</span>
        </div>
      </div>

      <!-- ✅ changed 'submitting' → 'loading' -->
      <button class="btn" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Sending…' : 'Send reset link' }}
      </button>
    </form>

    <div class="success-state" *ngIf="submitted">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <p class="success-msg">Check your inbox — a reset link has been sent if that email is registered.</p>
    </div>

    <div class="footer-links" style="justify-content: center; margin-top: 1.25rem;">
      <a routerLink="/account/login">Back to sign in</a>
    </div>
  </div>
</div>
